services:
  db:
    environment:
      POSTGRES_USER: achat
      POSTGRES_PASSWORD: achat_dev
    ports:
      - "5432:5432"

  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=achat;Username=achat;Password=achat_dev"
      Jwt__Secret: "dev-secret-at-least-32-chars-long!!"
      Jwt__Issuer: "achat"
      Jwt__Audience: "achat"
      Encryption__Key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      Telegram__WebhookBaseUrl: "https://your-ngrok-url-here"
      Telegram__RateLimiting__Enabled: "true"
      Telegram__RateLimiting__GlobalInboundPerSecond: "60"
      Telegram__RateLimiting__GlobalInboundBurst: "120"
      Telegram__RateLimiting__GlobalOutboundPerSecond: "30"
      Telegram__RateLimiting__GlobalOutboundBurst: "60"
      Telegram__RateLimiting__PerBotOutboundPerSecond: "20"
      Telegram__RateLimiting__PerBotOutboundBurst: "30"
      Telegram__RateLimiting__QueueCapacity: "5000"
      Telegram__RateLimiting__DispatcherIdleDelayMs: "25"
      Telegram__RateLimiting__MaxRetryAttempts: "5"
      Telegram__RateLimiting__DefaultRetryAfterSeconds: "2"
      Admin__Email: "admin@achat.local"
      Admin__Password: "admin"
    ports:
      - "8080:8080"

volumes:
  pgdata:
