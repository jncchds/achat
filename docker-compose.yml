services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: achat
      POSTGRES_USER: achat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-achat}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U achat -d achat"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=achat;Username=achat;Password=${POSTGRES_PASSWORD:-achat}"
      Jwt__Secret: ${JWT_SECRET:-CHANGE_ME_TO_A_SECURE_32_CHAR_SECRET_KEY}
      Jwt__Issuer: AChat
      Jwt__Audience: AChat
      Jwt__ExpiryHours: 24
      InitialUser__Username: ${INITIAL_USER:-admin}
      InitialUser__Password: ${INITIAL_PASSWORD:-changeme}
      BotEvolution__IntervalHours: 24
      BotEvolution__MinOwnerMessagesRequired: 10
      BotEvolution__MaxMessagesContext: 50
      Telegram__GlobalRateLimitPerMinute: 100
      Telegram__PerBotRateLimitPerMinute: 20
      Telegram__DefaultUnknownUserReply: "I don't know you, go away"

volumes:
  pgdata:
